spring.application.name=my_blog
app.db.host=${DB_HOST:101.34.250.167}
app.db.port=${DB_PORT:5432}
app.db.name=${DB_NAME:my_blog}
app.db.user=${DB_USER:my_blog}
app.db.password=${DB_PASSWORD:my_blog}
app.db.auto-migrate=${DB_AUTO_MIGRATE:true}
spring.datasource.url=jdbc:postgresql://${app.db.host}:${app.db.port}/${app.db.name}
spring.datasource.username=${app.db.user}
spring.datasource.password=${app.db.password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
mybatis-plus.configuration.map-underscore-to-camel-case=true
# 可选：额外 CORS 来源（逗号分隔），例如 http://192.168.1.10:* 或 https://blog.example.com
app.cors.extra-origin-patterns=${CORS_EXTRA_ORIGIN_PATTERNS:}
server.port=${SERVER_PORT:19080}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.forward-headers-strategy=framework
server.servlet.session.cookie.same-site=lax
blog.author.password=${BLOG_AUTHOR_PASSWORD:change-me}
blog.author.login-rate-limit.max-attempts=${BLOG_AUTHOR_LOGIN_MAX_ATTEMPTS:5}
blog.author.login-rate-limit.window-seconds=${BLOG_AUTHOR_LOGIN_WINDOW_SECONDS:60}
server.servlet.session.timeout=${SERVER_SESSION_TIMEOUT:2h}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.http.access-log.enabled=${HTTP_ACCESS_LOG_ENABLED:true}
app.http.access-log.exclude-paths=${HTTP_ACCESS_LOG_EXCLUDE:/actuator/**,/error}
app.http.access-log.max-body-chars=${HTTP_ACCESS_LOG_MAX_BODY_CHARS:4000}
app.http.access-log.request-content-cache-limit=${HTTP_ACCESS_LOG_REQUEST_CACHE_BYTES:524288}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{requestId:-}] %logger{40} - %msg%n
