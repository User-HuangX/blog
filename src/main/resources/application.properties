spring.application.name=my_blog
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${DEV_DB_PORT:5433}/${DEV_DB_NAME:my_blog_dev}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DEV_DB_USER:my_blog_dev}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DEV_DB_PASSWORD:my_blog_dev}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always
mybatis-plus.configuration.map-underscore-to-camel-case=true
server.port=${SERVER_PORT:8080}
blog.author.password=${BLOG_AUTHOR_PASSWORD:change-me}
blog.upload.dir=${BLOG_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
