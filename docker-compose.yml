services:
  app:
    image: my_blog_app:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my_blog_app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST:-101.34.250.167}:${DB_PORT:-5432}/${DB_NAME:-my_blog}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-my_blog}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-my_blog}
      SPRING_SQL_INIT_MODE: ${SPRING_SQL_INIT_MODE:-never}
      BLOG_AUTHOR_PASSWORD: ${BLOG_AUTHOR_PASSWORD:-change-me}
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    image: my_blog_frontend:local
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: my_blog_frontend
    depends_on:
      - app
    ports:
      - "80:80"
    restart: unless-stopped

