services:
  postgres:
    image: postgres:16-alpine
    container_name: my_blog_pgsql
    environment:
      POSTGRES_DB: my_blog
      POSTGRES_USER: my_blog
      POSTGRES_PASSWORD: my_blog
    ports:
      - "5432:5432"
    volumes:
      - ${HOME}/blog/data/pgsql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U my_blog -d my_blog"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  app:
    image: my_blog_app:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my_blog_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/my_blog
      SPRING_DATASOURCE_USERNAME: my_blog
      SPRING_DATASOURCE_PASSWORD: my_blog
      BLOG_AUTHOR_PASSWORD: ${BLOG_AUTHOR_PASSWORD:-change-me}
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    image: my_blog_frontend:local
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: my_blog_frontend
    depends_on:
      - app
    ports:
      - "80:80"
    restart: unless-stopped

