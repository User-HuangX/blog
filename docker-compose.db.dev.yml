services:
  postgres:
    image: postgres:16-alpine
    container_name: my_blog_pgsql_dev
    environment:
      POSTGRES_DB: ${DEV_DB_NAME:-my_blog_dev}
      POSTGRES_USER: ${DEV_DB_USER:-my_blog_dev}
      POSTGRES_PASSWORD: ${DEV_DB_PASSWORD:-my_blog_dev}
    ports:
      - "${DEV_DB_PORT:-5433}:5432"
    volumes:
      - "${DEV_DB_DATA_DIR:-${HOME}/blog/data/pgsql-dev}:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

